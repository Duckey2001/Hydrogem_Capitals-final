<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #111c44; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .container { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2); max-width: 400px; width: 100%; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: 600; color: #333; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn { width: 100%; padding: 10px; background: #2e59d9; color: #fff; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #1a4bb8; }
        .login-link { margin-top: 15px; font-size: 14px; color: #555; }
        .login-link a { color: #2e59d9; text-decoration: none; font-weight: bold; }
        .login-link a:hover { text-decoration: underline; }
        #error { color: #e74c3c; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Create an Account</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required minlength="8">
            </div>

            <div id="error"></div>
            <button type="submit" class="btn">Register</button>

            <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </div>

    <script>
    // Single configurable API base URL (defaults to same origin as this page).
    const API_BASE = window.API_BASE || "";

    async function getCsrfToken() {
        const res = await fetch(`${API_BASE}/api/csrf-token`, { credentials: "include" });
        const data = await res.json();
        return data.csrfToken;
    }

    document.getElementById("registerForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorEl = document.getElementById("error");
        errorEl.textContent = "";

        try {
            const csrfToken = await getCsrfToken();
            const res = await fetch(`${API_BASE}/api/users/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "CSRF-Token": csrfToken },
                credentials: "include",
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();

            if (res.ok && data.message === "User registered") {
                alert("Registration successful! You can now log in.");
                window.location.href = "login.html";
            } else {
                errorEl.textContent = data.error || "Registration failed. Please try again.";
            }
        } catch (err) {
            errorEl.textContent = "Unable to reach the server. Please try again.";
        }
    });
    </script>

</body>
</html>
