<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Update</title>
    <link rel="stylesheet" href="https://hydrogemcapitals.com/assets/frontend/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://hydrogemcapitals.com/assets/global/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://hydrogemcapitals.com/assets/frontend/css/style.css">
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="site-card">
                <div class="site-card-header">
                    <h3 class="title">Profile Update</h3>
                </div>
                <div class="site-card-body">
                    <form id="profile-form" onsubmit="updateProfile(event)">
                        <div class="form-group">
                            <label for="first_name">First Name</label>
                            <input type="text" id="first_name" name="first_name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="last_name">Last Name</label>
                            <input type="text" id="last_name" name="last_name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="text" id="phone" name="phone" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" name="city" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="zip_code">Zip Code</label>
                            <input type="text" id="zip_code" name="zip_code" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" name="address" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="country">Country</label>
                            <input type="text" id="country" name="country" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="avatar">Profile Picture</label>
                            <input type="file" id="avatar" name="avatar" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://hydrogemcapitals.com/assets/global/js/jquery.min.js"></script>
<script src="https://hydrogemcapitals.com/assets/frontend/js/bootstrap.bundle.min.js"></script>
<script src="https://hydrogemcapitals.com/assets/frontend/js/notify.min.js"></script>

<script>
    function updateProfile(event) {
        event.preventDefault();

        // Get form values
        const formData = new FormData(event.target);
        const username = formData.get('username');

        // Create user object
        const user = {
            firstName: formData.get('first_name'),
            lastName: formData.get('last_name'),
            username: username,
            phone: formData.get('phone'),
            city: formData.get('city'),
            zipCode: formData.get('zip_code'),
            address: formData.get('address'),
            email: document.getElementById('email').value,
            country: document.getElementById('country').value
        };

        // Handle file upload
        const avatarFile = formData.get('avatar');
        if (avatarFile && avatarFile.size > 0) {
            const reader = new FileReader();
            reader.onload = function(e) {
                user.avatar = e.target.result;
                saveUserData(user, username);
            };
            reader.readAsDataURL(avatarFile);
        } else {
            saveUserData(user, username);
        }
    }

    function saveUserData(user, username) {
        // Save to localStorage
        localStorage.setItem(username, JSON.stringify(user));

        // Show success message
        new Notify({
            status: 'success',
            title: 'Success',
            text: 'Profile updated successfully!',
            effect: 'fade',
            speed: 300,
            customClass: '',
            showIcon: true,
            showCloseButton: true,
            autoclose: true,
            autotimeout: 3000,
            gap: 20,
            distance: 20,
            type: 1,
            position: 'right top'
        });
    }
</script>

</body>
</html>
