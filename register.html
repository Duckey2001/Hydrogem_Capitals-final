<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrogem Capitals Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script>
        const countryData = {
            "South Africa": { "code": "+27", "cities": ["Cape Town", "Johannesburg", "Durban"] },
            "Lesotho": { "code": "+266", "cities": ["Maseru", "Maputsoe", "Hlotse"] },
            "Botswana": { "code": "+267", "cities": ["Gaborone", "Francistown", "Maun"] },
            "United States": { "code": "+1", "cities": ["New York", "Los Angeles", "Chicago"] },
            "United Kingdom": { "code": "+44", "cities": ["London", "Manchester", "Birmingham"] },
            "Canada": { "code": "+1", "cities": ["Toronto", "Vancouver", "Montreal"] },
            "Australia": { "code": "+61", "cities": ["Sydney", "Melbourne", "Brisbane"] },
            "India": { "code": "+91", "cities": ["New Delhi", "Mumbai", "Bangalore"] },
            "Japan": { "code": "+81", "cities": ["Tokyo", "Osaka", "Kyoto"] },
            "France": { "code": "+33", "cities": ["Paris", "Marseille", "Lyon"] },
            "Germany": { "code": "+49", "cities": ["Berlin", "Hamburg", "Munich"] },
            "Brazil": { "code": "+55", "cities": ["São Paulo", "Rio de Janeiro", "Brasília"] },
            "China": { "code": "+86", "cities": ["Beijing", "Shanghai", "Guangzhou"] },
            "Russia": { "code": "+7", "cities": ["Moscow", "Saint Petersburg", "Novosibirsk"] },
            "Mexico": { "code": "+52", "cities": ["Mexico City", "Guadalajara", "Monterrey"] },
            "Egypt": { "code": "+20", "cities": ["Cairo", "Alexandria", "Giza"] }
        };

        function updateCountryInfo() {
            const countrySelect = document.getElementById("country");
            const phoneCode = document.getElementById("phone-code");
            const citySelect = document.getElementById("city");

            const selectedCountry = countrySelect.value;
            phoneCode.textContent = countryData[selectedCountry].code;

            citySelect.innerHTML = "";
            countryData[selectedCountry].cities.forEach(city => {
                let option = document.createElement("option");
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
        }

        function validatePassword(password) {
            const minLength = 8;
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumbers = /[0-9]/.test(password);
            const hasSpecialChars = /[!@#$%^&*(),.?":{}|<>]/.test(password);

            return password.length >= minLength && hasUpperCase && hasLowerCase && hasNumbers && hasSpecialChars;
        }

        function registerUser(event) {
            event.preventDefault();
            const firstName = document.querySelector('input[placeholder="First Name"]').value;
            const lastName = document.querySelector('input[placeholder="Last Name"]').value;
            const email = document.querySelector('input[placeholder="Email Address"]').value;
            const username = document.querySelector('input[placeholder="Username"]').value;
            const country = document.getElementById('country').value;
            const city = document.getElementById('city').value;
            const phoneNumber = document.querySelector('input[placeholder="Phone Number"]').value;
            const password = document.querySelector('input[placeholder="Password"]').value;
            const confirmPassword = document.querySelector('input[placeholder="Confirm Password"]').value;

            if (!validatePassword(password)) {
                alert("Password must be at least 8 characters long and include uppercase, lowercase, numbers, and special characters.");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            const user = { firstName, lastName, email, username, country, city, phoneNumber, password };
            localStorage.setItem(username, JSON.stringify(user));
            alert("Registration successful!");
        }

        function loginUser(event) {
            event.preventDefault();
            const username = document.querySelector('input[placeholder="Username"]').value;
            const password = document.querySelector('input[placeholder="Password"]').value;

            const user = JSON.parse(localStorage.getItem(username));
            if (user && user.password === password) {
                alert("Login successful!");
            } else {
                alert("Invalid username or password.");
            }
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #161b4b;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
        }
        .logo img {
            width: 150px;
            align-items: center;
        }
        h2 {
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
        }
        input, select {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            align-items: center;
        }
        .phone-group {
            display: flex;
            align-items: center;
        }
        .phone-group span {
            padding: 10px;
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 5px 0 0 5px;
        }
        .phone-group input {
            flex: 1;
            border-radius: 0 5px 5px 0;
        }
        .recaptcha {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f1f1f1;
        }
        .recaptcha input {
            margin-right: 10px;
        }
        button {
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="con_img">
            <figure><img class="img_responsive" src="images/WhatsApp Image 2025-02-20 at 17.49.30_65046ac8.jpg" alt="#" height="100" width="100" /></figure>
        </div>
        <h2>Create an Account</h2>
        <form onsubmit="registerUser(event)">
            <input type="text" placeholder="First Name" required>
            <input type="text" placeholder="Last Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="text" placeholder="Username" required>
            <label for="country">Select Country:</label>
            <select id="country" onchange="updateCountryInfo()" required>
                <option>South Africa</option>
                <option>Lesotho</option>
                <option>Botswana</option>
                <option>United States</option>
                <option>United Kingdom</option>
            </select>
            <label for="city">Select City:</label>
            <select id="city" required></select>
            <div class="phone-group">
                <span id="phone-code">+27</span>
                <input type="text" placeholder="Phone Number" required>
            </div>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <div class="recaptcha">
                <input type="checkbox" required> I'm not a robot
            </div>
            <button type="submit">Register</button>
        </form>
    </div>
    <div class="container">
        <h2>Login</h2>
        <form onsubmit="loginUser(event)">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        updateCountryInfo();
    </script>
</body>
</html>
