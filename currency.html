<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styling.css"/>    
    <link rel="stylesheet" href="style3.css"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Ticker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .ticker-container {
            width: 100%;
            overflow: hidden;
            background: #004085; /* Deep blue background */
            color: #fff;
            padding: 10px 0;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .ticker-wrapper {
            display: flex;
            white-space: nowrap;
            animation: tickerMove 30s linear infinite;
        }

        .ticker-item {
            margin-right: 50px;
            font-size: 16px;
            font-weight: bold;
        }

        @keyframes tickerMove {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>

    <div class="ticker-container">
        <div class="ticker-wrapper" id="currencyTicker">
            Loading currency rates...
        </div>
    </div>

    <script>
        async function fetchCurrencyRates() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD'); // Replace with a premium API if needed
                const data = await response.json();
                
                // List of currencies to display
                const currencies = ['EUR', 'ZAR', 'LSL', 'MZN', 'GBP', 'JPY', 'CAD', 'AUD', 'BTC']; 

                let tickerHTML = '';
                currencies.forEach(currency => {
                    if (data.rates[currency]) {
                        tickerHTML += `<span class="ticker-item">${currency}: ${data.rates[currency].toFixed(2)}</span>`;
                    }
                });

                document.getElementById('currencyTicker').innerHTML = tickerHTML;
            } catch (error) {
                document.getElementById('currencyTicker').innerHTML = 'Failed to load currency rates.';
            }
        }

        fetchCurrencyRates();
        setInterval(fetchCurrencyRates, 21600000); // Update every 6 hours (21600000 ms)
    </script>

</body>
</html>
