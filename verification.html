    <script>
    (function ($) {
        'use strict';

        let pusherAppKey = "be09ea9de9775e90aa1b";
        let pusherAppCluster = "us2";

        var notification = new Pusher(pusherAppKey, {
            encrypted: true,
            cluster: pusherAppCluster,
        });
        var channel = notification.subscribe('user-notification108');

        channel.bind('notification-event', function (result) {
            playSound();
            latestNotification();
            notifyToast(result);
        });


        function latestNotification() {
            $.get('https://cnxcapital.net/user/latest-notification', function (data) {
                $('.user-notifications108').html(data);
            })
        }

        function notifyToast(data) {

                title: data.data.title,
                text: data.data.notice,
                effect: 'slide',
                speed: 300,
                customClass: '',

                showIcon: true,
                showCloseButton: true,
                autoclose: true,
                autotimeout: 9000,
                gap: 20,

                position: 'right bottom',

            })

        }

            var audio = new Audio("https://cnxcapital.net/assets/global/tune/sticky.mp3");
