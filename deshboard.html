<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrogem Capitals - Dashboard</title>
    <!-- Include FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/1.0.0/css/lucide.min.css">
    <style>
        /* [Previous CSS remains exactly the same] */
        /* All your existing CSS styles remain unchanged */
        /* I'm keeping them the same to maintain your design */
        
        /* Additional styles for better alignment */
        .single .content h4 {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .single .content h4 b {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .single .content h4 .count {
            font-size: 24px;
            font-weight: bold;
        }
        
        .invest-now-btn {
            margin-top: 15px;
        }
    </style>
</head>
<body class="dark-theme" data-theme="dark">
    <!-- [Previous HTML structure remains exactly the same until the script section] -->
    <!-- All your existing HTML remains unchanged -->
    
    <script>
        // [Previous JavaScript remains exactly the same until the generateReferralLink function]
        
        // Generate a unique referral link for each user using their user ID from localStorage
        function generateReferralLink() {
            // Check if user already has a referral code in localStorage
            let referralCode = localStorage.getItem('userReferralCode');
            
            if (!referralCode) {
                // Generate a new referral code if one doesn't exist
                referralCode = 'HC-' + Math.random().toString(36).substring(2, 8).toUpperCase();
                localStorage.setItem('userReferralCode', referralCode);
            }
            
            const refLink = `https://hydrogemcapitals.com/register?ref=${referralCode}`;
            document.getElementById('refLink').value = refLink;
            
            // Store the referral count in localStorage if not already present
            if (!localStorage.getItem('referralCount')) {
                localStorage.setItem('referralCount', '0');
            }
            document.getElementById('referralCount').textContent = localStorage.getItem('referralCount');
        }
        
        // Enhanced wallet transfer modal functions with validation
        function transferFunds() {
            const fromWallet = document.getElementById('fromWallet').value;
            const toWallet = document.getElementById('toWallet').value;
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!fromWallet || !toWallet || !amount || amount <= 0) {
                alert('Please fill all fields with valid values');
                return;
            }
            
            if (fromWallet === toWallet) {
                alert('Cannot transfer to the same wallet');
                return;
            }
            
            // Get current balances from localStorage or set defaults
            let mainBalance = parseFloat(localStorage.getItem('mainWalletBalance') || 1250.00;
            let profitBalance = parseFloat(localStorage.getItem('profitWalletBalance')) || 3750.50;
            
            // Process transfer
            if (fromWallet === 'main') {
                if (amount > mainBalance) {
                    alert('Insufficient funds in Main Wallet');
                    return;
                }
                mainBalance -= amount;
            } else {
                if (amount > profitBalance) {
                    alert('Insufficient funds in Profit Wallet');
                    return;
                }
                profitBalance -= amount;
            }
            
            if (toWallet === 'main') {
                mainBalance += amount;
            } else {
                profitBalance += amount;
            }
            
            // Update localStorage
            localStorage.setItem('mainWalletBalance', mainBalance.toFixed(2));
            localStorage.setItem('profitWalletBalance', profitBalance.toFixed(2));
            
            // Update UI
            document.getElementById('mainWalletBalance').textContent = mainBalance.toFixed(2);
            document.getElementById('profitWalletBalance').textContent = profitBalance.toFixed(2);
            
            alert(`Successfully transferred USDT ${amount.toFixed(2)}`);
            closeTransferModal();
        }
        
        // Generate a unique wallet address for each user
        function generateWalletAddress() {
            let walletAddress = localStorage.getItem('userWalletAddress');
            
            if (!walletAddress) {
                // Generate a new wallet address if one doesn't exist
                const chars = '0123456789ABCDEF';
                walletAddress = 'HC-';
                for (let i = 0; i < 12; i++) {
                    walletAddress += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                localStorage.setItem('userWalletAddress', walletAddress);
            }
            
            return walletAddress;
        }
        
        // Initialize the page with user data
        window.onload = function() {
            // Generate or retrieve user's wallet address
            generateWalletAddress();
            
            // Initialize wallet balances from localStorage or set defaults
            if (!localStorage.getItem('mainWalletBalance')) {
                localStorage.setItem('mainWalletBalance', '1250.00');
            }
            if (!localStorage.getItem('profitWalletBalance')) {
                localStorage.setItem('profitWalletBalance', '3750.50');
            }
            
            // Update UI with stored values
            document.getElementById('mainWalletBalance').textContent = localStorage.getItem('mainWalletBalance');
            document.getElementById('profitWalletBalance').textContent = localStorage.getItem('profitWalletBalance');
            
            // Generate referral link
            generateReferralLink();
            
            // Update all counts from localStorage
            const stats = {
                'All Transactions': 'transactionsCount',
                'Total Deposit': 'totalDeposit',
                'Total Investment': 'totalInvestment',
                'Total Points': 'totalPoints',
                'Total Withdraw': 'totalWithdraw',
                'Referral Bonus': 'referralBonus',
                'Deposit Bonus': 'depositBonus',
                'Investment Bonus': 'investmentBonus',
                'Total Referral': 'referralCount'
            };
            
            // Initialize counts if not set
            if (!localStorage.getItem('transactionsCount')) {
                localStorage.setItem('transactionsCount', '12');
            }
            if (!localStorage.getItem('totalDeposit')) {
                localStorage.setItem('totalDeposit', '5000.00');
            }
            if (!localStorage.getItem('totalInvestment')) {
                localStorage.setItem('totalInvestment', '3250.00');
            }
            if (!localStorage.getItem('totalPoints')) {
                localStorage.setItem('totalPoints', '1250');
            }
            if (!localStorage.getItem('totalWithdraw')) {
                localStorage.setItem('totalWithdraw', '1750.50');
            }
            if (!localStorage.getItem('referralBonus')) {
                localStorage.setItem('referralBonus', '500.00');
            }
            if (!localStorage.getItem('depositBonus')) {
                localStorage.setItem('depositBonus', '250.00');
            }
            if (!localStorage.getItem('investmentBonus')) {
                localStorage.setItem('investmentBonus', '750.00');
            }
            
            // Update all count elements
            document.querySelectorAll('.count').forEach(element => {
                const statName = element.closest('.single').querySelector('p').textContent;
                const storageKey = stats[statName];
                if (storageKey) {
                    element.textContent = localStorage.getItem(storageKey);
                }
            });
            
            // Close modals when clicking outside
            window.onclick = function(event) {
                if (event.target == document.getElementById('transferModal')) {
                    closeTransferModal();
                }
            }
            
            // Prevent selecting same wallet in transfer form
            document.getElementById('fromWallet').addEventListener('change', function() {
                const toWallet = document.getElementById('toWallet');
                for (let i = 0; i < toWallet.options.length; i++) {
                    toWallet.options[i].disabled = toWallet.options[i].value === this.value;
                }
            });
            
            document.getElementById('toWallet').addEventListener('change', function() {
                const fromWallet = document.getElementById('fromWallet');
                for (let i = 0; i < fromWallet.options.length; i++) {
                    fromWallet.options[i].disabled = fromWallet.options[i].value === this.value;
                }
            });
            
            // Enhanced logout functionality
            document.querySelector('.logout a').addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.clear(); // Clear all user data
                window.location.href = 'index.html'; // Redirect to index
            });
        };
        
        // Function to handle deposits (to be called from deposit page)
        function processDeposit(amount) {
            // Update main wallet balance
            let mainBalance = parseFloat(localStorage.getItem('mainWalletBalance')) || 0;
            mainBalance += parseFloat(amount);
            localStorage.setItem('mainWalletBalance', mainBalance.toFixed(2));
            
            // Update total deposit
            let totalDeposit = parseFloat(localStorage.getItem('totalDeposit')) || 0;
            totalDeposit += parseFloat(amount);
            localStorage.setItem('totalDeposit', totalDeposit.toFixed(2));
            
            // Update transactions count
            let transactionsCount = parseInt(localStorage.getItem('transactionsCount')) || 0;
            transactionsCount++;
            localStorage.setItem('transactionsCount', transactionsCount.toString());
            
            // Return to dashboard with success message
            window.location.href = 'dashboard.html?depositSuccess=true';
        }
    </script>
</body>
</html>
