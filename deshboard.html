<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrogem Capitals - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0056B3;
            --primary-dark: #003366;
            --secondary-color: #1E2A38;
            --secondary-light: #2C3A4B;
            --background-dark: #0A0F17;
            --text-light: #FFFFFF;
            --text-dark: #333333;
            --text-gray: #B0B0B0;
            --border-color: #2A3A50;
            --card-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --primary-color: #0056B3;
            --primary-dark: #003366;
            --secondary-color: #F5F7FA;
            --secondary-light: #E1E5EB;
            --background-dark: #FFFFFF;
            --text-light: #333333;
            --text-dark: #111111;
            --text-gray: #666666;
            --border-color: #CCCCCC;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-dark);
            color: var(--text-light);
            line-height: 1.6;
            transition: var(--transition);
            background-image: url('images/background.jpeg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        /* [Previous CSS styles remain unchanged] */
        /* ... (include all your previous CSS styles here) ... */

        /* NEW PERFECT ALIGNMENT STYLES */
        .single {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 25px 20px;
            text-align: center;
        }

        .single .icon {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 15px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .single .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .single .content h4 {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .single .content h4 b {
            font-size: 14px;
            font-weight: normal;
            color: var(--text-gray);
        }

        .single .content h4 .count {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-light);
        }

        .single .content p {
            margin: 10px 0 0;
            font-size: 14px;
            color: var(--text-gray);
        }

        .invest-now-btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            font-size: 14px;
        }

        /* Make all cards equal height */
        .user-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Perfectly aligned referral section */
        .referral-link-form {
            display: flex;
            align-items: center;
        }

        .referral-link-form input {
            flex: 1;
            padding: 10px 15px;
        }

        .referral-link-form button {
            padding: 10px 15px;
            white-space: nowrap;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .single {
                padding: 20px 15px;
            }
            
            .user-cards {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 576px) {
            .user-cards {
                grid-template-columns: 1fr;
            }
            
            .referral-link-form {
                flex-direction: column;
            }
            
            .referral-link-form button {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body class="dark-theme" data-theme="dark">
    <!-- [Rest of your HTML remains exactly the same until the cards section] -->
    
    <!-- Updated Cards Section with Perfect Alignment -->
    <div class="row user-cards">
        <!-- All Transactions -->
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-12">
            <div class="single" onclick="handleStatClick('transactions')">
                <div class="icon"><i class="fas fa-exchange-alt"></i></div>
                <div class="content">
                    <h4><span class="count">0</span></h4>
                    <p>All Transactions</p>
                </div>
                <button class="invest-now-btn" onclick="handleInvestClick('transactions')">View more</button>
            </div>
        </div>
    
        <!-- Total Deposit -->
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-12">
            <div class="single" onclick="handleStatClick('deposit')">
                <div class="icon"><i class="fas fa-coins"></i></div>
                <div class="content">
                    <h4><span class="count">0.00</span> <b>USDT</b></h4>
                    <p>Total Deposit</p>
                </div>
                <button class="invest-now-btn" onclick="handleInvestClick('deposit')">View more</button>
            </div>
        </div>
    
        <!-- Total Investment -->
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-12">
            <div class="single" onclick="handleStatClick('investment')">
                <div class="icon"><i class="fas fa-chart-pie"></i></div>
                <div class="content">
                    <h4><span class="count">0.00</span> <b>USDT</b></h4>
                    <p>Total Investment</p>
                </div>
                <button class="invest-now-btn" onclick="handleInvestClick('investment')">View more</button>
            </div>
        </div>
    
        <!-- Total Points -->
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-12">
            <div class="single" onclick="handleStatClick('points')">
                <div class="icon"><i class="fas fa-star"></i></div>
                <div class="content">
                    <h4><span class="count">0</span></h4>
                    <p>Total Points</p>
                </div>
                <button class="invest-now-btn" onclick="handleInvestClick('points')">View more</button>
            </div>
        </div>
    
        <!-- Total Withdraw -->
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-12">
            <div class="single" onclick="handleStatClick('withdraw')">
                <div class="icon"><i class="fas fa-money-check-alt"></i></div>
                <div class="content">
                    <h4><span class="count">0.00</span> <b>USDT</b></h4>
                    <p>Total Withdraw</p>
                </div>
                <button class="invest-now-btn" onclick="handleInvestClick('withdraw')">View more</button>
            </div>
        </div>
    
        <!-- Referral Bonus -->
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-12">
            <div class="single" onclick="handleStatClick('referral-bonus')">
                <div class="icon"><i class="fas fa-gift"></i></div>
                <div class="content">
                    <h4><span class="count">0.00</span> <b>USDT</b></h4>
                    <p>Referral Bonus</p>
                </div>
                <button class="invest-now-btn" onclick="handleInvestClick('referral-bonus')">View more</button>
            </div>
        </div>
    
        <!-- Deposit Bonus -->
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-12">
            <div class="single" onclick="handleStatClick('deposit-bonus')">
                <div class="icon"><i class="fas fa-piggy-bank"></i></div>
                <div class="content">
                    <h4><span class="count">0.00</span> <b>USDT</b></h4>
                    <p>Deposit Bonus</p>
                </div>
                <button class="invest-now-btn" onclick="handleInvestClick('deposit-bonus')">View more</button>
            </div>
        </div>
    
        <!-- Investment Bonus -->
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-12">
            <div class="single" onclick="handleStatClick('investment-bonus')">
                <div class="icon"><i class="fas fa-trophy"></i></div>
                <div class="content">
                    <h4><span class="count">0.00</span> <b>USDT</b></h4>
                    <p>Investment Bonus</p>
                </div>
                <button class="invest-now-btn" onclick="handleInvestClick('investment-bonus')">View more</button>
            </div>
        </div>
    </div>

    <!-- [Rest of your HTML and JavaScript remains exactly the same] -->
</body>
</html>
