    <style>
        body {

        }

        .withdraw-btn {

        }
        .message {
            margin-top: 20px;
            text-align: center;

        }

</head>
<body class="dark-theme">

    <!--Full Layout-->

                <div class="nav-right">

        <div class="single-right">

        <div class="single-right">
            <button type="button" class="item" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="anticon anticon-user"></i>

                <li>
                    <a href="settingss.html" class="dropdown-item" type="button"><i class="anticon anticon-setting"></i>Settings</a>

                <li class="logout">
                    <form method="POST" action="logout.html" id="logout-form">
                        <input type="hidden" name="_token" value="L3OjUxq6CueXJsGgzB5nQ7yw8tonIwVgVSto9Sur">
                        <a href="https://hydrogemcapitals.com/logout" class="dropdown-item"

    <div class="withdraw-container">
        <h2>Withdraw Funds</h2>
        <form id="withdrawForm" action="PayoutRequest.html" method="GET">
            <div class="form-group">
                <label for="amount">Amount (USDT)</label>
                <input type="number" id="amount" name="amount" placeholder="Enter amount to withdraw" required>
            </div>

            <div class="form-group">
                <label for="wallet">Wallet Address</label>
                <input type="text" id="wallet" name="wallet" placeholder="Enter your wallet address" required>
            </div>

            <button type="submit" class="withdraw-btn">Withdraw</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        // Handle form submission
        document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent the form from submitting the traditional way

            const amount = document.getElementById('amount').value;
            const wallet = document.getElementById('wallet').value;
            const messageDiv = document.getElementById('message');

            // Validate the amount
            if (!amount || isNaN(amount) || amount < 20) {
                messageDiv.textContent = 'Please enter a valid amount of at least $20.';
                messageDiv.className = 'message error';
                return;
            }

            // Here you would typically check if the wallet is the main wallet
            const mainWalletAddress = "YOUR_MAIN_WALLET_ADDRESS"; // Replace with the actual main wallet address
            if (wallet !== mainWalletAddress) {
                messageDiv.textContent = 'You can only withdraw to your main wallet address.';
                messageDiv.className = 'message error';
                return;
            }

            try {
                // Send a POST request to the backend
                const response = await fetch('https://hydrogemcapitals.com/api/withdraw', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer YOUR_AUTH_TOKEN' // Replace with actual token
                    },
                    body: JSON.stringify({ amount: parseFloat(amount), wallet: wallet })
                });

                const result = await response.json();

                if (response.ok) {
                    messageDiv.textContent = `Withdrawal successful: ${result.message}`;
                    messageDiv.className = 'message success';
                } else {
                    messageDiv.textContent = `Withdrawal failed: ${result.message}`;
                    messageDiv.className = 'message error';
                }
            } catch (error) {
                console.error('Error during withdrawal:', error);
                messageDiv.textContent = 'An error occurred during withdrawal. Please try again.';
                messageDiv.className = 'message error';
            }
        });
    </script>
