<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - AAA Finity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="scripte/favicon.png" type="image/x-icon">
    
    <style>
        :root {
            --primary-color: #dba03c;
            --primary-hover: #e78800;
            --dark-bg: #121212;
            --light-bg: #fbfaf8;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #080808;
            --text-light: #f8f9fa;
            --border-color: #dfa750;
            --error-color: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('assets/images/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 2rem auto;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-dark);
            opacity: 0.8;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .form-control {
            height: 50px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: rgba(255, 225, 179, 0.05);
            padding-left: 45px;
            transition: all 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(219, 160, 60, 0.25);
            border-color: var(--primary-color);
            background-color: white;
        }

        .input-group-text {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            color: var(--primary-color);
            background: transparent;
            border: none;
        }

        .btn-login {
            background: linear-gradient(45deg, var(--primary-color), #25221e);
            border: none;
            height: 50px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: linear-gradient(45deg, var(--primary-hover), #25221e);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(219, 160, 60, 0.3);
        }

        .links-container {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .login-link {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .login-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-google {
            background: #DB4437;
        }

        .btn-facebook {
            background: #4267B2;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: block;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--primary-color);
            z-index: 5;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            
            .links-container {
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="logo-container">
                <img src="assets/images/logo-dark.png" alt="AAA Finity Logo">
            </div>
            
            <h1 class="login-title">Welcome back</h1>
            <p class="login-subtitle">Log into your account. Don't have an account? <a href="Register" class="login-link">Register here</a></p>
            
            <form method="post" action="./Login" id="loginForm">
                <div class="mb-3">
                    <div class="position-relative">
                        <i class="fas fa-user input-group-text"></i>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Enter Member ID" required>
                    </div>
                    <span id="usernameError" class="error-message"></span>
                </div>
                
                <div class="mb-3 password-container">
                    <div class="position-relative">
                        <i class="fas fa-lock input-group-text"></i>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Enter Password" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                    <span id="passwordError" class="error-message"></span>
                </div>
                
                <div class="d-grid gap-2 mb-3">
                    <button type="submit" class="btn btn-login btn-block">Sign In</button>
                </div>
                
                <div class="links-container">
                    <a href="forget_password" class="login-link">Forgot password?</a>
                    <a href="Register" class="login-link">New Registration</a>
                </div>
                
                <!-- Uncomment if you want social login options -->
                <!--
                <div class="divider">or continue with</div>
                
                <div class="social-login">
                    <a href="#" class="social-btn btn-google"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn btn-facebook"><i class="fab fa-facebook-f"></i></a>
                </div>
                -->
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Password toggle functionality
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye-slash');
                this.classList.toggle('fa-eye');
            });
            
            // Form validation
            const loginForm = document.getElementById('loginForm');
            
            loginForm.addEventListener('submit', function(e) {
                let isValid = true;
                
                // Validate username
                const username = document.getElementById('username').value.trim();
                if (!username) {
                    document.getElementById('usernameError').textContent = 'Please enter your Member ID';
                    isValid = false;
                } else {
                    document.getElementById('usernameError').textContent = '';
                }
                
                // Validate password
                const password = document.getElementById('password').value.trim();
                if (!password) {
                    document.getElementById('passwordError').textContent = 'Please enter your password';
                    isValid = false;
                } else {
                    document.getElementById('passwordError').textContent = '';
                }
                
                if (!isValid) {
                    e.preventDefault();
                }
                
                // In a real application, you would add AJAX submission here
            });
            
            // Input validation on blur
            document.getElementById('username').addEventListener('blur', function() {
                if (!this.value.trim()) {
                    document.getElementById('usernameError').textContent = 'Please enter your Member ID';
                } else {
                    document.getElementById('usernameError').textContent = '';
                }
            });
            
            document.getElementById('password').addEventListener('blur', function() {
                if (!this.value.trim()) {
                    document.getElementById('passwordError').textContent = 'Please enter your password';
                } else {
                    document.getElementById('passwordError').textContent = '';
                }
            });
        });
    </script>
</body>
</html>
