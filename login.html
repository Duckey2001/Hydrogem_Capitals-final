<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #1a2980, #26d0ce);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 1rem;
      background-color: #4caf50;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    button:hover {
      background-color: #45a049;
    }
    .error {
      color: #ff6b6b;
      text-align: center;
      min-height: 1.2rem;
      font-size: 14px;
    }
    .register-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 14px;
    }
    .register-link a {
      color: #4caf50;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <div class="error" id="errorMsg"></div>
      <div class="register-link">
        Don't have an account? <a href="#" id="register">Register</a>
      </div>
    </form>
  </div>

  <script>
    (function () {
      const emailField = document.getElementById("email");
      const passwordField = document.getElementById("password");
      const errorMsg = document.getElementById("errorMsg");

      const hash = (str) => {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          hash = (hash << 5) - hash + str.charCodeAt(i);
          hash |= 0;
        }
        return hash.toString();
      };

      const loadUsers = () => {
        let users = localStorage.getItem("users");
        if (!users) {
          const defaultUsers = {
            "admin@secure.com": {
              password: hash("SecureAdmin123!"),
              name: "Admin",
              isAdmin: true,
            },
          };
          localStorage.setItem("users", JSON.stringify(defaultUsers));
          return defaultUsers;
        }
        return JSON.parse(users);
      };

      const login = (email, password) => {
        const users = loadUsers();
        const user = users[email];
        if (user && hash(password) === user.password) {
          const session = {
            email,
            name: user.name,
            isAdmin: user.isAdmin,
            token: hash(email + Date.now() + "salt"),
          };
          sessionStorage.setItem("session", JSON.stringify(session));
          return true;
        }
        return false;
      };

      document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const email = emailField.value.trim();
        const password = passwordField.value;

        if (!email || !password) {
          errorMsg.textContent = "Please enter both email and password.";
          return;
        }

        if (login(email, password)) {
          window.location.href = "dashboard.html";
        } else {
          errorMsg.textContent = "Invalid credentials.";
        }
      });

      // Redirect if already logged in
      if (sessionStorage.getItem("session")) {
        window.location.href = "dashboard.html";
      }

      // Register link handling
      document.getElementById("register").addEventListener("click", function (e) {
        e.preventDefault();
        errorMsg.textContent = "Registration is not open to the public.";
      });
    })();
  </script>
</body>
</html>
