<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Hydrogem Capitals</title>
    <link rel="stylesheet" href="../css/styling.css"/>
    <link rel="stylesheet" href="../css/style3.css"/>
    <style>
        :root {
            --primary-color: #3a7bd5;
            --secondary-color: #00d2ff;
            --dark-bg: #121826;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        /* Password Change Form Styling */
        .password-change-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .password-change-container h2 {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.2);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        .password-strength {
            height: 4px;
            background-color: var(--dark-bg);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .strength-meter {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .password-requirements {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .password-requirements ul {
            padding-left: 1.25rem;
            margin: 0.5rem 0 0;
        }

        .password-requirements li {
            margin-bottom: 0.25rem;
        }

        .password-requirements li.valid {
            color: var(--success-color);
        }

        .change-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .change-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(58, 123, 213, 0.3);
        }

        .change-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
            display: block;
        }

        .message.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            display: block;
        }

        @media (max-width: 768px) {
            .password-change-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <div class="panel-layout">
        <!-- Include the same header and sidebar as in dashboard.html -->
        <div class="panel-header">
            <!-- Header content -->
        </div>
        <div class="side-nav">
            <!-- Sidebar content -->
        </div>

        <!-- Page Content -->
        <div class="page-container">
            <div class="main-content">
                <div class="section-gap">
                    <div class="container-fluid">
                        <div class="password-change-container">
                            <h2>Change Password</h2>
                            <form id="changePasswordForm">
                                <div class="form-group">
                                    <label for="currentPassword">Current Password</label>
                                    <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter current password" required>
                                    <i class="fas fa-eye password-toggle" id="toggleCurrentPassword"></i>
                                </div>
                                
                                <div class="form-group">
                                    <label for="newPassword">New Password</label>
                                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                                    <i class="fas fa-eye password-toggle" id="toggleNewPassword"></i>
                                    <div class="password-strength">
                                        <div class="strength-meter" id="passwordStrength"></div>
                                    </div>
                                    <div class="password-requirements">
                                        <p>Password must contain:</p>
                                        <ul>
                                            <li id="req-length">At least 8 characters</li>
                                            <li id="req-uppercase">At least one uppercase letter</li>
                                            <li id="req-lowercase">At least one lowercase letter</li>
                                            <li id="req-number">At least one number</li>
                                            <li id="req-special">At least one special character</li>
                                        </ul>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="confirmPassword">Confirm New Password</label>
                                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
                                    <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
                                </div>
                                
                                <button type="submit" class="change-btn" id="submitBtn" disabled>Change Password</button>
                            </form>
                            <div id="message" class="message"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Password toggle functionality
            const toggleCurrentPassword = document.getElementById('toggleCurrentPassword');
            const toggleNewPassword = document.getElementById('toggleNewPassword');
            const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
            
            toggleCurrentPassword.addEventListener('click', function() {
                togglePasswordVisibility('currentPassword', toggleCurrentPassword);
            });
            
            toggleNewPassword.addEventListener('click', function() {
                togglePasswordVisibility('newPassword', toggleNewPassword);
            });
            
            toggleConfirmPassword.addEventListener('click', function() {
                togglePasswordVisibility('confirmPassword', toggleConfirmPassword);
            });
            
            function togglePasswordVisibility(inputId, icon) {
                const input = document.getElementById(inputId);
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            }
            
            // Password strength checker
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordStrength = document.getElementById('passwordStrength');
            const submitBtn = document.getElementById('submitBtn');
            
            newPasswordInput.addEventListener('input', function() {
                checkPasswordStrength(this.value);
                validateForm();
            });
            
            confirmPasswordInput.addEventListener('input', validateForm);
            document.getElementById('currentPassword').addEventListener('input', validateForm);
            
            function checkPasswordStrength(password) {
                // Reset requirements
                document.querySelectorAll('.password-requirements li').forEach(li => {
                    li.classList.remove('valid');
                });
                
                // Check requirements
                const hasLength = password.length >= 8;
                const hasUppercase = /[A-Z]/.test(password);
                const hasLowercase = /[a-z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
                
                // Update requirement indicators
                if (hasLength) document.getElementById('req-length').classList.add('valid');
                if (hasUppercase) document.getElementById('req-uppercase').classList.add('valid');
                if (hasLowercase) document.getElementById('req-lowercase').classList.add('valid');
                if (hasNumber) document.getElementById('req-number').classList.add('valid');
                if (hasSpecial) document.getElementById('req-special').classList.add('valid');
                
                // Calculate strength score (0-4)
                let strength = 0;
                if (hasLength) strength++;
                if (hasUppercase) strength++;
                if (hasLowercase) strength++;
                if (hasNumber) strength++;
                if (hasSpecial) strength++;
                
                // Update strength meter
                const width = (strength / 5) * 100;
                passwordStrength.style.width = width + '%';
                
                // Update color based on strength
                if (strength <= 1) {
                    passwordStrength.style.backgroundColor = var(--danger-color);
                } else if (strength <= 3) {
                    passwordStrength.style.backgroundColor = var(--warning-color);
                } else {
                    passwordStrength.style.backgroundColor = var(--success-color);
                }
            }
            
            function validateForm() {
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                // Check if all fields are filled
                if (!currentPassword || !newPassword || !confirmPassword) {
                    submitBtn.disabled = true;
                    return;
                }
                
                // Check if new password meets all requirements
                const hasLength = newPassword.length >= 8;
                const hasUppercase = /[A-Z]/.test(newPassword);
                const hasLowercase = /[a-z]/.test(newPassword);
                const hasNumber = /[0-9]/.test(newPassword);
                const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(newPassword);
                
                const isStrong = hasLength && hasUppercase && hasLowercase && hasNumber && hasSpecial;
                
                // Check if passwords match
                const passwordsMatch = newPassword === confirmPassword;
                
                // Enable/disable submit button
                submitBtn.disabled = !(isStrong && passwordsMatch);
            }
            
            // Form submission
            document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Simulate API call (replace with actual API call)
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = newPasswordInput.value;
                
                // Show loading state
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                submitBtn.disabled = true;
                
                // Simulate API delay
                setTimeout(function() {
                    // This would be replaced with actual API call
                    // For demonstration, we'll assume success
                    const success = true; // Change to false to simulate error
                    
                    if (success) {
                        showMessage('Password changed successfully!', 'success');
                        document.getElementById('changePasswordForm').reset();
                        passwordStrength.style.width = '0%';
                        document.querySelectorAll('.password-requirements li').forEach(li => {
                            li.classList.remove('valid');
                        });
                    } else {
                        showMessage('Failed to change password. Please check your current password.', 'error');
                    }
                    
                    submitBtn.innerHTML = 'Change Password';
                    submitBtn.disabled = false;
                }, 1500);
            });
            
            function showMessage(text, type) {
                const messageDiv = document.getElementById('message');
                messageDiv.textContent = text;
                messageDiv.className = 'message ' + type;
                
                // Hide message after 5 seconds
                setTimeout(function() {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>
